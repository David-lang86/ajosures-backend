spring.application.name=backend

# Render provides DATABASE_URL as: postgres://user:pass@host:port/db
# We accept JDBC_DATABASE_URL (jdbc:postgresql://...) as primary override,
# falling back to individual DB_HOST/PORT/NAME vars for local dev.
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ajosures}}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:GodHelpme@2005}

# Explicitly set dialect so Hibernate never fails to determine it
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration